<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collin O'Brien | Technical Producer & Director</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #D4AF37;
      --text: #f4f4f4;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      padding: 1.2rem 0;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      z-index: 1000;
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15rem;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    nav a:hover { color: var(--accent); }

    /* Hero */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 10%;
    }

    .hero video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.3;
      z-index: -1;
    }

    .tagline {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 300;
      max-width: 900px;
    }

    /* Work Section & Fanned Phones */
    .work {
      padding: 8rem 0;
      background: #000;
    }

    .work h2 {
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3rem;
      font-weight: 400;
      margin-bottom: 4rem;
    }

    .phones-wrapper {
      position: relative;
      height: 550px;
      max-width: 800px;
      margin: 0 auto;
    }

    .phone {
      position: absolute;
      left: 50%;
      width: 240px;
      height: 480px;
      background: #111;
      border-radius: 40px;
      border: 8px solid #1a1a1a;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s;
    }

    .phone video { width: 100%; height: 100%; object-fit: cover; }

    /* The Card Fan & Floating Animation */
    .phone:nth-child(1) { transform: translateX(-160%) rotate(-12deg); animation: float 7s ease-in-out infinite; }
    .phone:nth-child(2) { transform: translateX(-50%) translateY(-30px); z-index: 5; animation: float 7s ease-in-out infinite 1s; }
    .phone:nth-child(3) { transform: translateX(60%) rotate(12deg); animation: float 7s ease-in-out infinite 2s; }

    @keyframes float {
      0%, 100% { margin-top: 0; }
      50% { margin-top: -20px; }
    }

    /* Hover State */
    .phones-wrapper:hover .phone { opacity: 0.4; transform: translateX(-50%) scale(0.9); }
    .phones-wrapper .phone:hover { opacity: 1; transform: translateX(-50%) scale(1.05) !important; z-index: 10; }

    /* Brands - Symmetrical Grid */
    .brands {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      place-items: center;
      gap: 3rem;
      padding: 6rem 10%;
      background: var(--bg);
    }

    .brands svg {
      width: 100%;
      max-width: 110px;
      max-height: 45px;
      color: #555;
      transition: color 0.4s;
    }

    .brands svg:hover { color: #fff; }

    /* Responsive */
    @media (max-width: 900px) {
      .brands { grid-template-columns: repeat(3, 1fr); }
      .phones-wrapper { height: auto; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
      .phone { position: relative; left: 0; transform: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<nav>
  <a href="#home">Home</a>
  <a href="#work">Work</a>
  <a href="#contact">Contact</a>
</nav>
