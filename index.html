<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collin O'Brien – Technical Producer & Director</title>
  <style>
    /* Global Variables */
    :root {
      --bg-color: #0a0a0a;
      --surface-color: #1a1a1a;
      --text-main: #f4f4f4;
      --text-muted: #a0a0a0;
      --accent: #D4AF37;
      --spacing-section: 6rem;
      --radius: 12px;
    }

    body {
      margin: 0;
      font-family: 'Open Sans', -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
    }

    /* Navigation */
    nav {
      position: sticky;
      top: 0;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    nav a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
