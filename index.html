<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collin O'Brien – Director & Producer</title>
  <style>
    :root {
      --bg-color: #0a0a0a;
      --accent: #D4AF37;
      --text: #f4f4f4;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif; /* Cleaner than Open Sans for high-end feel */
      background-color: var(--bg-color);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Professional Nav */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: 0.3s;
    }

    nav a:hover { color: var(--accent); }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.4;
      z-index: -1;
    }

    .tagline {
      max-width: 800px;
      font-size: clamp(1.5rem, 5vw, 3rem);
      line-height: 1.2;
      font-weight: 300;
    }

    /* Fan-out Phone Section */
    .work-container {
      padding: 10rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .phones-wrapper {
      position: relative;
      height: 500px;
      width: 100%;
      max-width: 600px;
      margin-top: 4rem;
    }

    .phone {
      position: absolute;
      left: 50%;
      width: 220px;
      height: 450px;
      background: #000;
      border-radius: 35px;
      border: 6px solid #222;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), z-index 0.3s;
      animation: float 6s ease-in-out infinite;
    }

    .phone video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* The Fan Effect Logic */
    .phone:nth-child(1) { 
        transform: translateX(-160%) rotate(-15deg); 
        animation-delay: 0s;
    }
    .phone:nth-child(2) { 
        transform: translateX(-50%) translateY(-20px); 
        z-index: 2; 
        animation-delay: 1s;
    }
    .phone:nth-child(3) { 
        transform: translateX(60%) rotate(15deg); 
        animation-delay: 2s;
    }

    /* Hover interactions */
    .phones-wrapper:hover .phone {
        opacity: 0.5;
        transform: translateX(-50%) scale(0.9);
    }

    .phones-wrapper .phone:hover {
        opacity: 1;
        transform: translateX(-50%) scale(1.1) !important;
        z-index: 10;
        cursor: pointer;
    }

    @keyframes float {
      0%, 100% { transform: translate(var(--tw-x), 0); }
      50% { transform: translate(var(--tw-x), -15px); }
    }

    /* Brand Grids */
    .brands {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 4rem;
      padding: 4rem;
      max-width: 1200px;
      margin: 0 auto;
      align-items: center;
      opacity: 0.6;
    }

    .brands img { width: 100%; filter: brightness(0) invert(1); }

    @media (max-width: 768px) {
        .phones-wrapper { height: 1300px; }
        .phone { position: relative; left: 50%; transform: translateX(-50%) !important; margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="#work">Work</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<section class="hero">
  <video autoplay muted loop playsinline poster="fallback.jpg">
    <source src="background loop_1.mp4" type="video/mp4" />
  </video>
  <div class="tagline">Crafting narrative and branded content that inspires curiosity.</div>
</section>

<section class="work-container" id="work">
  <h2>Featured Work</h2>
  <div class="phones-wrapper">
    <div class="phone">
      <video autoplay muted loop playsinline><source src="Gabriela_1.mp4" type="video/mp4" /></video>
    </div>
    <div class="phone">
      <video autoplay muted loop playsinline><source src="Bella Dose and Alyssa Raghu_1.mp4" type="video/mp4" /></video>
    </div>
    <div class="phone">
      <video autoplay muted loop playsinline><source src="Jay_1.mp4" type="video/mp4" /></video>
    </div>
  </div>
</section>

</body>
</html>
